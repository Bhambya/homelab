name: crowdsecurity/immich-whitelists
description: "Whitelist false positive from Immich-api"
filter: "evt.Meta.service == 'http' && evt.Meta.log_type in ['http_access-log', 'http_error-log']"
whitelist:
  reason: "Whitelist false positive from Immich-api"
  expression:
   - evt.Parsed.traefik_router_name contains 'immich' && evt.Meta.http_verb == 'GET' && evt.Meta.http_status != '401' && evt.Meta.http_status != '403' && evt.Parsed.request matches '/api'
