# code: language=ansible
---
cron_jobs:
  # At 01:00, every day
  - name: "Pinchflat DB Backup"
    job: '{{ repo_path }}/scripts/sqlite-db-backup.sh /var/lib/docker-data/pinchflat/config/db pinchflat.db || curl -X POST -F "body=Cron pinchflat DB backup failed!" http://127.0.0.1:8000/notify/apprise'
    hour: "1"
    minute: "0"
    user: "root"

  # At 01:01, every day
  - name: "Immich DB Backup"
    job: '{{ repo_path }}/scripts/postgres-backup.sh -c immich_database -u postgres -p postgres -d all -b /var/lib/docker-data/immich/backups || curl -X POST -F "body=Cron Immich DB backup failed!" http://127.0.0.1:8000/notify/apprise'
    hour: "1"
    minute: "1"
    user: "root"

  # At 15 minutes past the hour, every hour, every day
  - name: "MyAnonymouse Seedbox IP update"
    job: "docker exec qbittorrent sh -c \"curl -s -b 'mam_id={{ lookup('bitwarden.secrets.lookup', 'd3f5dfc5-d58f-4329-991d-b41d00ad06e0') }}' https://t.myanonamouse.net/json/dynamicSeedbox.php\" || curl -X POST -F \"body=MAM Seedbox IP update failed!\" http://127.0.0.1:8000/notify/apprise"
    minute: "15"
    user: "root"
